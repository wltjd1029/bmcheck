<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>부평 배달현황 대시보드</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #21252e;
    --line: #2b313c;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #4f8cff;
    --ok: #2ecc71;
    --ok-bg: rgba(46, 204, 113, .15);
    --bad: #ff5a5f;
    --bad-bg: rgba(255, 90, 95, .15);
    --warn: #ffb020;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15, 17, 21, .92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .spacer { flex: 1; }
  .status-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.err { background: var(--bad); box-shadow: 0 0 8px var(--bad); }
  .btn {
    background: var(--card2); color: var(--text); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    font-weight: 600; transition: .15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }

  /* Summary */
  .summary {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .summary .item { text-align: center; }
  .summary .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .summary .value { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
  .summary .value.rate { color: var(--accent); }

  /* Part cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .card .head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card .name { font-size: 16px; font-weight: 700; }
  .badge {
    font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
  }
  .badge.ok { color: var(--ok); background: var(--ok-bg); }
  .badge.bad { color: var(--bad); background: var(--bad-bg); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 8px; margin-bottom: 14px; }
  .stat .k { font-size: 11px; color: var(--muted); }
  .stat .v { font-size: 22px; font-weight: 700; }
  .stat .v.remain { color: var(--warn); }
  .progress-wrap { margin-top: 4px; }
  .progress-top {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
  }
  .progress-top .pct { font-size: 18px; font-weight: 800; }
  .bar { height: 10px; background: var(--card2); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 999px; transition: width .5s ease; }
  .bar > span.ok { background: linear-gradient(90deg, #2ecc71, #27c46b); }
  .bar > span.bad { background: linear-gradient(90deg, #ff7a4d, #ff5a5f); }

  /* Aux table */
  .aux {
    margin-top: 20px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
  }
  .aux h2 { font-size: 14px; margin: 0 0 14px; color: var(--muted); font-weight: 600; }
  .aux-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 14px;
  }
  .aux-item {
    background: var(--card2); border-radius: 10px; padding: 14px; text-align: center;
  }
  .aux-item .k { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .aux-item .v { font-size: 24px; font-weight: 700; }

  /* Settings modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 50; padding: 40px 16px; overflow-y: auto;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 24px; width: 100%; max-width: 560px;
  }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal p.sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; }
  .setting-row {
    border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px;
  }
  .setting-row .title { font-weight: 700; margin-bottom: 10px; }
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 130px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--text); padding: 9px 10px; font-size: 15px;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .calc { font-size: 12px; color: var(--accent); margin-top: 8px; font-weight: 600; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .gsheet-info {
    font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.5;
    word-break: break-all; border-top: 1px solid var(--line); padding-top: 14px;
  }
  .updated { font-size: 11px; color: var(--muted); }
  @media (max-width: 480px) {
    .summary .value { font-size: 24px; }
  }
</style>
</head>
<body>
<header>
  <h1>🛵 부평 배달현황</h1>
  <span class="status-dot"><span class="dot" id="liveDot"></span><span id="liveText">연결 대기</span></span>
  <span class="spacer"></span>
  <span class="updated" id="updatedAt"></span>
  <button class="btn" id="refreshBtn">새로고침</button>
  <button class="btn primary" id="settingsBtn">⚙ 설정</button>
</header>

<main>
  <section class="summary">
    <div class="item"><div class="label">전체 배정건수</div><div class="value" id="sumAssigned">-</div></div>
    <div class="item"><div class="label">전체 완료콜</div><div class="value" id="sumDone">-</div></div>
    <div class="item"><div class="label">전체 남은건</div><div class="value" id="sumRemain">-</div></div>
    <div class="item"><div class="label">전체 달성률</div><div class="value rate" id="sumRate">-</div></div>
    <div class="item"><div class="label">달성 파트</div><div class="value" id="sumAchieved">-</div></div>
  </section>

  <section class="grid" id="cards"></section>

  <section class="aux">
    <h2>보조 현황</h2>
    <div class="aux-grid">
      <div class="aux-item"><div class="k">운행중인원수</div><div class="v" id="auxRunning">-</div></div>
      <div class="aux-item"><div class="k">거절</div><div class="v" id="auxReject">-</div></div>
      <div class="aux-item"><div class="k">배차취소</div><div class="v" id="auxDispatchCancel">-</div></div>
      <div class="aux-item"><div class="k">배달취소(라이더귀책)</div><div class="v" id="auxRiderCancel">-</div></div>
    </div>
  </section>
</main>

<!-- Settings modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>⚙ 파트별 배정물량 설정</h2>
    <p class="sub">배정물량 = 1세트 기준 배정건수 × 현재 세트 수</p>
    <div id="settingRows"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelBtn">취소</button>
      <button class="btn primary" id="saveBtn">저장</button>
    </div>
    <div class="gsheet-info">
      <b>구글시트 연동</b><br />
      시트: 부평현황시트 · gviz CSV 실시간 fetch<br />
      헤더 매핑: 아침점심피크완료 / 오후논피크완료 / 저녁피크완료 / 심야피크완료<br />
      보조: 운행중인원수 / 거절 / 배차취소 / 배달취소(라이더귀책)
    </div>
  </div>
</div>

<script>
/* ===================== 설정 ===================== */
const SHEET_ID = "1Y07FIWd-pkjLPoc0LNpD_I4YQfrwVdezojdeSOXGePI";
const SHEET_NAME = "부평현황시트";
const REFRESH_MS = 30000;
const STORAGE_KEY = "bupyeong_delivery_settings_v1";

// 4개 파트 정의: 시트 헤더 매핑 포함
const PARTS = [
  { id: "morning", name: "아침점심파트",   doneHeader: "아침점심피크완료" },
  { id: "offpeak", name: "오후논피크파트", doneHeader: "오후논피크완료" },
  { id: "evening", name: "저녁피크파트",   doneHeader: "저녁피크완료" },
  { id: "night",   name: "심야피크파트",   doneHeader: "심야피크완료" },
];

// 보조 표시 헤더
const AUX = [
  { id: "auxRunning",        header: "운행중인원수" },
  { id: "auxReject",         header: "거절" },
  { id: "auxDispatchCancel", header: "배차취소" },
  { id: "auxRiderCancel",    header: "배달취소(라이더귀책)" },
];

/* ===================== localStorage ===================== */
function loadSettings() {
  let s = {};
  try { s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) {}
  for (const p of PARTS) {
    if (!s[p.id]) s[p.id] = { perSet: 0, sets: 0 };
  }
  return s;
}
function saveSettings(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
let settings = loadSettings();

function assignedFor(partId) {
  const c = settings[partId] || { perSet: 0, sets: 0 };
  return (Number(c.perSet) || 0) * (Number(c.sets) || 0);
}

/* ===================== CSV 파싱 ===================== */
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ""; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch === '\r') { /* skip */ }
      else field += ch;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function gvizUrl() {
  const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;
  const params = `tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&_=${Date.now()}`;
  return `${base}?${params}`;
}

// 숫자만 추출 (콤마, 단위 제거)
function toNum(v) {
  if (v == null) return 0;
  const m = String(v).replace(/,/g, "").match(/-?\d+(\.\d+)?/);
  return m ? Number(m[0]) : 0;
}

/* 헤더로 값 찾기: 데이터행에서 해당 컬럼의 첫 유효(숫자) 값을 사용 */
function valueByHeader(rows, header) {
  if (!rows.length) return 0;
  const headers = rows[0].map(h => (h || "").trim());
  const col = headers.indexOf(header.trim());
  if (col === -1) return 0;
  // 헤더 아래 데이터행을 아래에서부터 훑어 마지막(최신) 유효값 사용
  for (let r = rows.length - 1; r >= 1; r--) {
    const cell = rows[r] && rows[r][col];
    if (cell != null && String(cell).trim() !== "") {
      return toNum(cell);
    }
  }
  return 0;
}

/* ===================== 렌더링 ===================== */
function renderCards(data) {
  const wrap = document.getElementById("cards");
  wrap.innerHTML = "";
  let totalAssigned = 0, totalDone = 0, achieved = 0;

  for (const p of PARTS) {
    const assigned = assignedFor(p.id);
    const done = data ? valueByHeader(data, p.doneHeader) : 0;
    const remain = Math.max(assigned - done, 0);
    const rate = assigned > 0 ? (done / assigned) * 100 : 0;
    const isOk = assigned > 0 && done >= assigned;
    if (isOk) achieved++;
    totalAssigned += assigned;
    totalDone += done;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="head">
        <span class="name">${p.name}</span>
        <span class="badge ${isOk ? "ok" : "bad"}">${isOk ? "✅ 달성" : "⏳ 미달성"}</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">배정건수</div><div class="v">${assigned.toLocaleString()}</div></div>
        <div class="stat"><div class="k">완료콜</div><div class="v">${done.toLocaleString()}</div></div>
        <div class="stat"><div class="k">남은건</div><div class="v remain">${remain.toLocaleString()}</div></div>
        <div class="stat"><div class="k">달성률</div><div class="v">${rate.toFixed(1)}%</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-top">
          <span style="font-size:11px;color:var(--muted)">진행</span>
          <span class="pct">${rate.toFixed(0)}%</span>
        </div>
        <div class="bar"><span class="${isOk ? "ok" : "bad"}" style="width:${Math.min(rate,100)}%"></span></div>
      </div>
    `;
    wrap.appendChild(card);
  }

  // 요약
  const totalRemain = Math.max(totalAssigned - totalDone, 0);
  const totalRate = totalAssigned > 0 ? (totalDone / totalAssigned) * 100 : 0;
  document.getElementById("sumAssigned").textContent = totalAssigned.toLocaleString();
  document.getElementById("sumDone").textContent = totalDone.toLocaleString();
  document.getElementById("sumRemain").textContent = totalRemain.toLocaleString();
  document.getElementById("sumRate").textContent = totalRate.toFixed(1) + "%";
  document.getElementById("sumAchieved").textContent = achieved + " / " + PARTS.length;

  // 보조
  for (const a of AUX) {
    const el = document.getElementById(a.id);
    if (el) el.textContent = data ? valueByHeader(data, a.header).toLocaleString() : "-";
  }
}

/* ===================== fetch ===================== */
let lastData = null;
function setStatus(state, text) {
  const dot = document.getElementById("liveDot");
  const t = document.getElementById("liveText");
  dot.className = "dot" + (state === "live" ? " live" : state === "err" ? " err" : "");
  t.textContent = text;
}

async function fetchData() {
  setStatus("", "불러오는 중…");
  try {
    const res = await fetch(gvizUrl(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    lastData = rows;
    renderCards(rows);
    setStatus("live", "실시간 연결됨");
    const now = new Date();
    document.getElementById("updatedAt").textContent =
      "업데이트 " + now.toLocaleTimeString("ko-KR");
  } catch (e) {
    console.error(e);
    setStatus("err", "연동 실패 (시트 공개 여부 확인)");
    renderCards(lastData); // 마지막 데이터 또는 설정값으로라도 렌더
  }
}

/* ===================== 설정 모달 ===================== */
function buildSettingRows() {
  const wrap = document.getElementById("settingRows");
  wrap.innerHTML = "";
  for (const p of PARTS) {
    const c = settings[p.id] || { perSet: 0, sets: 0 };
    const row = document.createElement("div");
    row.className = "setting-row";
    row.innerHTML = `
      <div class="title">${p.name}</div>
      <div class="field-row">
        <div class="field">
          <label>1세트 기준 배정건수</label>
          <input type="number" min="0" data-part="${p.id}" data-key="perSet" value="${c.perSet}">
        </div>
        <div class="field">
          <label>현재 세트 수</label>
          <input type="number" min="0" data-part="${p.id}" data-key="sets" value="${c.sets}">
        </div>
      </div>
      <div class="calc" id="calc-${p.id}">배정물량 = ${assignedFor(p.id).toLocaleString()} 건</div>
    `;
    wrap.appendChild(row);
  }
  // 실시간 계산 표시
  wrap.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", () => {
      const part = inp.dataset.part;
      const perSet = Number(wrap.querySelector(`input[data-part="${part}"][data-key="perSet"]`).value) || 0;
      const sets = Number(wrap.querySelector(`input[data-part="${part}"][data-key="sets"]`).value) || 0;
      document.getElementById("calc-" + part).textContent =
        "배정물량 = " + (perSet * sets).toLocaleString() + " 건";
    });
  });
}

function openSettings() {
  buildSettingRows();
  document.getElementById("overlay").classList.add("open");
}
function closeSettings() {
  document.getElementById("overlay").classList.remove("open");
}
function saveSettingsFromForm() {
  const wrap = document.getElementById("settingRows");
  wrap.querySelectorAll("input").forEach(inp => {
    const part = inp.dataset.part, key = inp.dataset.key;
    if (!settings[part]) settings[part] = { perSet: 0, sets: 0 };
    settings[part][key] = Number(inp.value) || 0;
  });
  saveSettings(settings);
  closeSettings();
  renderCards(lastData);
}

/* ===================== 이벤트 / 부팅 ===================== */
document.getElementById("settingsBtn").addEventListener("click", openSettings);
document.getElementById("cancelBtn").addEventListener("click", closeSettings);
document.getElementById("saveBtn").addEventListener("click", saveSettingsFromForm);
document.getElementById("refreshBtn").addEventListener("click", fetchData);
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closeSettings();
});

renderCards(null);   // 설정값 기준 초기 렌더
fetchData();         // 첫 fetch
setInterval(fetchData, REFRESH_MS);  // 30초 자동 새로고침
</script>
</body>
</html>
